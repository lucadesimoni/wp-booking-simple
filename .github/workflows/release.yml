name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create and release (e.g. v1.20.1). Must match the plugin's Version header, WP_BOOKING_SYSTEM_LUCA_VERSION constant and readme.txt Stable tag."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Resolve tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          case "$tag" in
            v*) ;;
            *) echo "::error::Tag ($tag) must start with 'v'"; exit 1 ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Verify plugin version matches tag
        run: |
          version="${{ steps.resolve.outputs.version }}"
          header_version=$(grep -E "^\s*\*\s*Version:" wp-booking-system.php | head -1 | sed -E 's/.*Version:\s*//')
          constant_version=$(grep -E "WP_BOOKING_SYSTEM_LUCA_VERSION" wp-booking-system.php | head -1 | sed -E "s/.*'([0-9]+\.[0-9]+\.[0-9]+)'.*/\1/")
          readme_stable=$(grep -E "^Stable tag:" readme.txt | head -1 | sed -E 's/Stable tag:\s*//')
          echo "version=$version header=$header_version constant=$constant_version readme=$readme_stable"
          if [ "$version" != "$header_version" ] || [ "$version" != "$constant_version" ] || [ "$version" != "$readme_stable" ]; then
            echo "::error::Tag version ($version) does not match plugin header/constant/readme version"
            exit 1
          fi

      - name: Build plugin ZIP
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Extract changelog for this version
        id: changelog
        run: |
          version="${{ steps.resolve.outputs.version }}"
          {
            echo "notes<<CHANGELOG_EOF"
            awk -v ver="$version" '
              /^[0-9]{4}\.[0-9]{2}\.[0-9]{2} - version / {
                if (found) exit
                if (index($0, "version " ver)) { found=1; print; next }
              }
              found { print }
            ' changelog.txt
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          name: "WP booking Luca ${{ steps.resolve.outputs.tag }}"
          body: |
            **Install:** download `wp-booking-luca.zip` below and upload it via
            *WordPress → Plugins → Add New → Upload Plugin*.

            ## Changes

            ${{ steps.changelog.outputs.notes }}
          files: dist/wp-booking-luca.zip
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
